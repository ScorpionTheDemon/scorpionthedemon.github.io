<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorpion The Demon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- DISTORTION WORLD BACKGROUND -->
<div class="distortion-bg">
    <div class="tendrils"></div>
    <div class="tendrils"></div>
    <div class="tendrils"></div>
</div>

<!-- TITLE -->
<div class="title">
    SCORPION // THE // DEMON
</div>

<div class="main-layout">

    <!-- Twitch Stream -->
    <div class="stream-container">
        <iframe
            id="twitchStream"
            src="https://player.twitch.tv/?channel=scorpionthedemon&parent=scorpionthedemon.github.io"
            allowfullscreen>
        </iframe>
    </div>

    <!-- Twitch Chat -->
    <div class="chat-container">
        <iframe
            src="https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io">
        </iframe>
    </div>

</div>

<!-- Distortion World Ambient -->
<audio id="distortionLoop" loop>
    <source src="distortion_world_ambient.mp3" type="audio/mpeg">
</audio>

<script>
const ambient = document.getElementById('distortionLoop');
const twitchIframe = document.getElementById('twitchStream');

// Start ambient after first click
const startAmbient = () => {
    ambient.play().catch(()=>console.log("Ambient blocked"));
    window.removeEventListener('click', startAmbient);
};
window.addEventListener('click', startAmbient);

// Mute ambient while Twitch iframe is loaded
twitchIframe.onload = () => { ambient.muted = true; };

// Auto-resume ambient if Twitch not live
setInterval(() => {
    try {
        const doc = twitchIframe.contentWindow.document;
        ambient.muted = true;
    } catch(e) {
        if(ambient.paused){
            ambient.muted = false;
            ambient.play().catch(()=>console.log("Ambient resume blocked"));
        }
    }
}, 5000);
</script>

</body>
</html>
