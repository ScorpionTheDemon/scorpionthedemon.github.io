<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scorpion The Demon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <!-- DISTORTION WORLD BACKGROUND -->
    <div class="void-bg"></div>

    <!-- TITLE -->
    <div class="title">
        SCORPION // THE // DEMON
    </div>

    <div class="main-layout">

        <!-- STREAM -->
        <div class="stream-container">
            <iframe
                id="twitchStream"
                src="https://player.twitch.tv/?channel=scorpionthedemon&parent=scorpionthedemon.github.io"
                allowfullscreen>
            </iframe>
        </div>

        <!-- Twitch Chat -->
        <div class="chat-container">
            <iframe
                src="https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io">
            </iframe>
        </div>

    </div>

    <!-- DISTORTION WORLD AMBIENT -->
    <audio id="distortionLoop" loop autoplay>
        <source src="distortion_world_ambient.mp3" type="audio/mpeg">
    </audio>

    <script>
        const twitchIframe = document.getElementById('twitchStream');
        const ambient = document.getElementById('distortionLoop');

        // Auto-mute ambient if Twitch stream is playing
        // (simple check using iframe focus; Twitch API more complex)
        twitchIframe.onload = () => {
            ambient.muted = true;
        };
    </script>

</body>
</html>
