<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scorpion The Demon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <!-- DISTORTION WORLD BACKGROUND -->
    <div class="void-bg"></div>

    <!-- TITLE -->
    <div class="title">
        SCORPION // THE // DEMON
    </div>

    <div class="main-layout">

        <!-- STREAM -->
        <div class="stream-container">
            <iframe
                id="twitchStream"
                src="https://player.twitch.tv/?channel=scorpionthedemon&parent=scorpionthedemon.github.io"
                allowfullscreen>
            </iframe>
        </div>

        <!-- Twitch Chat -->
        <div class="chat-container">
            <iframe
                src="https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io">
            </iframe>
        </div>

    </div>

    <!-- DISTORTION WORLD AMBIENT -->
    <audio id="distortionLoop" loop muted>
        <source src="distortion_world_ambient.mp3" type="audio/mpeg">
    </audio>

    <script>
        const ambient = document.getElementById('distortionLoop');
        const twitchIframe = document.getElementById('twitchStream');

        // 1. Play ambient after first user interaction
        const playAmbient = () => {
            ambient.muted = false;
            ambient.play().catch(err => console.log("Ambient autoplay blocked until user interaction."));
            window.removeEventListener('click', playAmbient);
        };
        window.addEventListener('click', playAmbient);

        // 2. Detect Twitch stream iframe load
        twitchIframe.onload = () => {
            ambient.muted = true;
            console.log("Ambient muted because Twitch stream loaded");
        };

        // 3. Auto-resume ambient if Twitch stream is not playing
        // (polling the iframe for "blur" or absence)
        setInterval(() => {
            try {
                const twitchPlayer = twitchIframe.contentWindow.document;
                // If we can access it, assume Twitch is live -> mute ambient
                ambient.muted = true;
            } catch (e) {
                // Cross-origin error means Twitch iframe not accessible (normal), so resume ambient
                if (ambient.paused) {
                    ambient.muted = false;
                    ambient.play().catch(err => console.log("Ambient resume blocked."));
                }
            }
        }, 5000); // check every 5 seconds
    </script>

</body>
</html>
