<style>

/* RESET */
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family:'Press Start 2P', monospace;
    background:black;
}

/* BACKGROUND */
.bg {
    position:fixed;
    width:110%;
    height:110%;
    top:-5%;
    left:-5%;
    background: url("https://cdna.artstation.com/p/assets/images/images/037/369/240/large/caleb-waldrop-joey-mora-screenshot-107.jpg?1620203977") no-repeat center center;
    background-size: cover;
    z-index:-2;
    animation: drift 30s ease-in-out infinite alternate;
    transition: transform 0.2s ease-out;
}

@keyframes drift {
    0% { transform: scale(1) translate(0px, 0px); }
    50% { transform: scale(1.03) translate(-10px, 10px); }
    100% { transform: scale(1.05) translate(10px, -10px); }
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
    z-index:-1;
}

/* STACK */
.top-stack {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    margin-top:20px;
    z-index:1;
}

/* TITLE */
.title {
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
}

/* GIRATINA */
.giratina-gif {
    display:flex;
    justify-content:center;
    position:relative;
}

.clone {
    position:absolute;
    width:180px;
    opacity:0.25;
    filter: blur(4px) drop-shadow(0 0 20px #7e22ce);
}

.clone.left {
    transform: translateX(-40px);
    animation: floatCloneLeft 7s ease-in-out infinite;
}

.clone.right {
    transform: translateX(40px);
    animation: floatCloneRight 8s ease-in-out infinite;
}

@keyframes floatCloneLeft {
    0% { transform: translateX(-40px) translateY(0); }
    50% { transform: translateX(-50px) translateY(-10px); }
    100% { transform: translateX(-40px) translateY(0); }
}

@keyframes floatCloneRight {
    0% { transform: translateX(40px) translateY(0); }
    50% { transform: translateX(50px) translateY(-12px); }
    100% { transform: translateX(40px) translateY(0); }
}

.giratina-main {
    width:180px;
    filter:
        drop-shadow(0 0 10px #a855f7)
        drop-shadow(0 0 25px #7e22ce);
    animation: floatMain 6s ease-in-out infinite;
}

@keyframes floatMain {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}

/* BULLETIN */
.bulletin {
    font-size:14px;
    letter-spacing:2px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    text-align:center;
}

/* ADMIN BUTTON */
.admin-btn {
    font-family:'Press Start 2P', monospace;
    font-size:12px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    background:transparent;
    border:2px solid #7e22ce;
    border-radius:8px;
    padding:4px 10px;
    cursor:pointer;
}

/* PLAYER TITLE */
.player-title {
    font-size:14px;
    letter-spacing:2px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    text-align:center;
}

/* SMARTIES LOGO */
.smarties-logo {
    width:150px;
    margin:10px 0;
    animation: floatLogo 6s ease-in-out infinite;
}

@keyframes floatLogo {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}

/* LAYOUT */
.main-layout {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-top:20px;
}

.stream-container {
    width:65vw;
    max-width:1100px;
    aspect-ratio:16/9;
    border:3px solid #7e22ce;
    border-radius:12px;
    overflow:hidden;
    background:black;
}

.stream-container iframe {
    width:100%;
    height:100%;
    border:none;
}

.chat-container {
    width:300px;
    height:65vh;
}

.chat-container iframe {
    width:100%;
    height:100%;
    border:2px solid #7e22ce;
}

/* MOBILE */
@media(max-width:900px){
    .main-layout {flex-direction:column;}
    .stream-container {width:95vw;}
    .chat-container {width:95vw;height:400px;}
}

</style>

</head>

<script>
// TOKEN CACHE
let cachedToken=null, tokenExpiry=0;
async function token(){
 if(cachedToken && Date.now()<tokenExpiry) return cachedToken;
 const r=await fetch(`https://id.twitch.tv/oauth2/token?client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&grant_type=client_credentials`,{method:"POST"});
 const d=await r.json();
 cachedToken=d.access_token;
 tokenExpiry=Date.now()+(d.expires_in-60)*1000;
 return cachedToken;
}

// STREAM SYSTEM
const CLIENT_ID="fiymv8n5jpz24y9xzj471pp1kvqvc5";
const CLIENT_SECRET="9arqj32z9d5owge40cngaakm6fwa75";
const MAIN_CHANNEL="scorpionthedemon";
const SMARTIES=["mookei","peach","froggyhoppins","YokaSiri","KitsuAisu","DeliciaRin","Boesschen","Nyansie","imzenu","SunshiSunshu","Kabooks","Emi_does_crime"];

const player=document.getElementById("mainPlayer");
const chat=document.getElementById("chatFrame");
const title=document.getElementById("playerTitle");

let currentMode="";
let currentStreamer="";

const playlist="PLdFp7yyF5kzvjldbIzt-W8RlFNkywxhfe";
const yt=`https://www.youtube.com/embed?listType=playlist&list=${playlist}&autoplay=1&mute=1`;

// CHECK LIVE
async function isLive(user,t){
 const r=await fetch(`https://api.twitch.tv/helix/streams?user_login=${user}`,{
  headers:{"Client-ID":CLIENT_ID,"Authorization":`Bearer ${t}`}
 });
 const d=await r.json();
 return d.data?.length;
}

async function check(){
 const t=await token();

 // YOU
 if(await isLive(MAIN_CHANNEL,t)){
  if(currentMode!=="main"){
   player.src=`https://player.twitch.tv/?channel=${MAIN_CHANNEL}&parent=${location.hostname}`;
   chat.src=`https://www.twitch.tv/embed/${MAIN_CHANNEL}/chat?parent=${location.hostname}&darkpopout`;
   title.textContent=`LIVE NOW: ${MAIN_CHANNEL}`;
   currentMode="main";
   currentStreamer=MAIN_CHANNEL;
  }
  return;
 }

 // LOCK CURRENT
 if(currentMode==="smarties" && currentStreamer){
  if(await isLive(currentStreamer,t)) return;
 }

 // FIND FIRST LIVE
 for(const u of SMARTIES){
  if(await isLive(u,t)){
   if(currentStreamer!==u){
    player.src=`https://player.twitch.tv/?channel=${u}&parent=${location.hostname}`;
    chat.src=`https://www.twitch.tv/embed/${u}/chat?parent=${location.hostname}&darkpopout`;
    title.textContent=`Smarties Live: ${u}`;
    currentMode="smarties";
    currentStreamer=u;
   }
   return;
  }
 }

 // YOUTUBE
 if(currentMode!=="youtube"){
  player.src=yt;
  chat.src=`https://www.twitch.tv/embed/${MAIN_CHANNEL}/chat?parent=${location.hostname}&darkpopout`;
  title.textContent="YouTube Playlist Active";
  currentMode="youtube";
  currentStreamer="";
 }
}

check();
setInterval(check,60000);
</script>
