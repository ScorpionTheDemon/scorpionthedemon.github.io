<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorpion The Demon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* RESET */
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
    background:black;
}

/* BACKGROUND */
.bg {
    position:fixed;
    width:110%;
    height:110%;
    top:-5%;
    left:-5%;
    background: url("https://cdna.artstation.com/p/assets/images/images/037/369/240/large/caleb-waldrop-joey-mora-screenshot-107.jpg?1620203977") no-repeat center center;
    background-size: cover;
    z-index:-2;
    animation: drift 30s ease-in-out infinite alternate;
    transition: transform 0.2s ease-out;
}

@keyframes drift {
    0% { transform: scale(1) translate(0px, 0px); }
    50% { transform: scale(1.03) translate(-10px, 10px); }
    100% { transform: scale(1.05) translate(10px, -10px); }
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
    z-index:-1;
}

/* TITLE */
.title {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
}

/* GIRATINA */
.giratina-gif {
    position:absolute;
    top:120px; /* moved lower */
    width:100%;
    display:flex;
    justify-content:center;
}

.clone {
    position:absolute;
    width:180px;
    opacity:0.25;
    filter: blur(4px) drop-shadow(0 0 20px #7e22ce);
}

.clone.left {
    transform: translateX(-40px);
    animation: floatCloneLeft 7s ease-in-out infinite;
}

.clone.right {
    transform: translateX(40px);
    animation: floatCloneRight 8s ease-in-out infinite;
}

@keyframes floatCloneLeft {
    0% { transform: translateX(-40px) translateY(0); }
    50% { transform: translateX(-50px) translateY(-10px); }
    100% { transform: translateX(-40px) translateY(0); }
}

@keyframes floatCloneRight {
    0% { transform: translateX(40px) translateY(0); }
    50% { transform: translateX(50px) translateY(-12px); }
    100% { transform: translateX(40px) translateY(0); }
}

.giratina-main {
    width:180px;
    filter:
        drop-shadow(0 0 10px #a855f7)
        drop-shadow(0 0 25px #7e22ce);
    animation: floatMain 6s ease-in-out infinite;
}

@keyframes floatMain {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}

/* BULLETIN */
.bulletin {
    position:absolute;
    top:320px; /* below Giratina */
    width:100%;
    text-align:center;
    font-size:14px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    z-index:2;
}

/* Admin login & input */
#adminControls {
    position:absolute;
    top:350px; /* below bulletin */
    width:100%;
    text-align:center;
    z-index:2;
    display:none; /* hidden until correct password */
}

#adminControls input[type="text"] {
    font-family:'Press Start 2P', monospace;
    font-size:12px;
    padding:5px;
    width:300px;
    max-width:90%;
}

#adminControls button {
    font-family:'Press Start 2P', monospace;
    font-size:12px;
    padding:5px 10px;
    margin-left:5px;
    background:#7e22ce;
    color:#c084ff;
    border:none;
    cursor:pointer;
}

/* Player Title */
.player-title {
    position:absolute;
    width:65vw;
    max-width:1100px;
    left:50%;
    transform:translateX(-50%);
    top:390px; /* below bulletin + admin controls */
    text-align:center;
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    z-index:2;
}

/* LAYOUT */
.main-layout {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    height:calc(100vh - 440px); /* enough space for Giratina + bulletin + admin + title */
    gap:20px;
    padding-top:440px; /* reserve space from top */
}

.stream-container {
    width:65vw;
    max-width:1100px;
    aspect-ratio:16/9;
    border:3px solid #7e22ce;
    border-radius:12px;
    overflow:hidden;
    background:black;
}

.stream-container iframe {
    width:100%;
    height:100%;
    border:none;
}

.chat-container {
    width:300px;
    height:65vh;
}

.chat-container iframe {
    width:100%;
    height:100%;
    border:2px solid #7e22ce;
}

/* MOBILE */
@media(max-width:900px){
    .main-layout {flex-direction:column;}
    .stream-container {width:95vw;}
    .chat-container {width:95vw;height:400px;}
}

</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="title">SCORPION // THE // DEMON</div>

<div class="giratina-gif">
    <img class="clone left" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img id="giratinaImg" class="giratina-main" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img class="clone right" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
</div>

<div class="bulletin" id="bulletin">Welcome to the site!</div>

<!-- Admin login button -->
<div id="adminLoginContainer" style="position:absolute;top:350px;width:100%;text-align:center;z-index:2;">
    <button id="adminLoginButton" style="font-family:'Press Start 2P', monospace;font-size:12px;padding:5px 10px;background:#7e22ce;color:#c084ff;border:none;cursor:pointer;">
        Admin Login
    </button>
</div>

<!-- Admin input field -->
<div id="adminControls">
    <input type="text" id="bulletinInput" placeholder="Enter new bulletin message">
    <button onclick="updateBulletin(bulletinInput.value)">Update Bulletin</button>
</div>

<div class="player-title" id="playerTitle">Loading stream/video...</div>

<div class="main-layout">

    <div class="stream-container">
        <iframe id="mainPlayer" allowfullscreen></iframe>
    </div>

    <div class="chat-container">
        <iframe id="twitchChat" src="https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io&darkpopout" allowfullscreen></iframe>
    </div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB2cWCYGCDJuSaBpgbm0Mpu7-Q8ucsLGEA",
  authDomain: "scorpionthedemon-website.firebaseapp.com",
  databaseURL: "https://scorpionthedemon-website-default-rtdb.firebaseio.com",
  projectId: "scorpionthedemon-website",
  storageBucket: "scorpionthedemon-website.firebasestorage.app",
  messagingSenderId: "1013538876770",
  appId: "1:1013538876770:web:88874fecec0b606e14503b",
  measurementId: "G-FDDRD74GM1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const bulletinRef = db.ref("bulletin");

// Owner password
const OWNER_PASSWORD = "Colvin12";
let isOwner = false;

// Admin login button
const adminLoginButton = document.getElementById("adminLoginButton");
const adminControls = document.getElementById("adminControls");

adminLoginButton.addEventListener("click", () => {
    const pw = prompt("Enter bulletin password:");
    if(pw === OWNER_PASSWORD){
        isOwner = true;
        adminControls.style.display = "block";
        alert("Access granted! You can now update the bulletin.");
    }else{
        alert("Incorrect password.");
    }
});

// Listen for bulletin updates
bulletinRef.on("value", (snapshot) => {
    const msg = snapshot.val();
    if(msg) document.getElementById("bulletin").innerText = msg;
});

// Function to update bulletin (owner only)
function updateBulletin(message){
    if(isOwner){
        bulletinRef.set(message);
        document.getElementById("bulletinInput").value = "";
    }else{
        alert("Only the owner can post to the bulletin!");
    }
}

/* Mouse reactive background */
const bg = document.getElementById("bg");
document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 30;
    const y = (e.clientY / window.innerHeight - 0.5) * 30;
    bg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
});

/* Twitch + YouTube + friends switching */
const CLIENT_ID = "fiymv8n5jpz24y9xzj471pp1kvqvc5";
const CLIENT_SECRET = "9arqj32z9d5owge40cngaakm6fwa75";

// Priority order: main channel, friends, YouTube
const CHANNELS = [
    "scorpionthedemon",
    "marggyonvt",
    "idollplushie",
    "uwoslab"
];

const twitchChat = document.getElementById("twitchChat");
const player = document.getElementById("mainPlayer");
const playerTitle = document.getElementById("playerTitle");

// YouTube playlist
const youtubePlaylist = "PLdFp7yyF5kzvjldbIzt-W8RlFNkywxhfe";
const youtubeEmbed = `https://www.youtube.com/embed?listType=playlist&list=${youtubePlaylist}&autoplay=1&mute=1&loop=1&playlist=${youtubePlaylist}`;

// Start on YouTube by default
player.src = youtubeEmbed;
playerTitle.innerText = "Playing YouTube playlist";

// Check Twitch live status
async function getAccessToken() {
    const res = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&grant_type=client_credentials`, {
        method: "POST"
    });
    const data = await res.json();
    return data.access_token;
}

async function checkLive() {
    try {
        const token = await getAccessToken();
        let liveFound = false;

        for(const channel of CHANNELS){
            const res = await fetch(`https://api.twitch.tv/helix/streams?user_login=${channel}`, {
                headers:{
                    "Client-ID": CLIENT_ID,
                    "Authorization": `Bearer ${token}`
                }
            });
            const data = await res.json();
            if(data.data && data.data.length > 0){
                // Stream is live
                if(!player.src.includes(channel)){
                    player.src = `https://player.twitch.tv/?channel=${channel}&parent=scorpionthedemon.github.io`;
                    twitchChat.src = `https://www.twitch.tv/embed/${channel}/chat?parent=scorpionthedemon.github.io&darkpopout`;
                    playerTitle.innerText = `Live on Twitch: ${channel}`;
                }
                liveFound = true;
                break;
            }
        }

        if(!liveFound){
            if(!player.src.includes("youtube.com")){
                player.src = youtubeEmbed;
                twitchChat.src = `https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io&darkpopout`;
                playerTitle.innerText = "Playing YouTube playlist";
            }
        }
    } catch(err){
        console.error(err);
        if(!player.src.includes("youtube.com")){
            player.src = youtubeEmbed;
            playerTitle.innerText = "Playing YouTube playlist";
        }
    }
}

checkLive();
setInterval(checkLive, 60000);

</script>

</body>
</html>
