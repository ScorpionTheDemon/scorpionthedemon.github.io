<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorpion The Demon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* RESET */
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
    background:black;
}

/* BACKGROUND */
.bg {
    position:fixed;
    width:110%;
    height:110%;
    top:-5%;
    left:-5%;
    background: url("https://cdna.artstation.com/p/assets/images/images/037/369/240/large/caleb-waldrop-joey-mora-screenshot-107.jpg?1620203977") no-repeat center center;
    background-size: cover;
    z-index:-2;
    animation: drift 30s ease-in-out infinite alternate;
    transition: transform 0.2s ease-out;
}

@keyframes drift {
    0% { transform: scale(1) translate(0px, 0px); }
    50% { transform: scale(1.03) translate(-10px, 10px); }
    100% { transform: scale(1.05) translate(10px, -10px); }
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
    z-index:-1;
}

/* TITLE */
.title {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
}

/* GIRATINA */
.giratina-gif {
    position:absolute;
    top:60px;
    width:100%;
    display:flex;
    justify-content:center;
}

.clone {
    position:absolute;
    width:180px;
    opacity:0.25;
    filter: blur(4px) drop-shadow(0 0 20px #7e22ce);
}

.clone.left {
    transform: translateX(-40px);
    animation: floatCloneLeft 7s ease-in-out infinite;
}

.clone.right {
    transform: translateX(40px);
    animation: floatCloneRight 8s ease-in-out infinite;
}

@keyframes floatCloneLeft {
    0% { transform: translateX(-40px) translateY(0); }
    50% { transform: translateX(-50px) translateY(-10px); }
    100% { transform: translateX(-40px) translateY(0); }
}

@keyframes floatCloneRight {
    0% { transform: translateX(40px) translateY(0); }
    50% { transform: translateX(50px) translateY(-12px); }
    100% { transform: translateX(40px) translateY(0); }
}

.giratina-main {
    width:180px;
    filter:
        drop-shadow(0 0 10px #a855f7)
        drop-shadow(0 0 25px #7e22ce);
    animation: floatMain 6s ease-in-out infinite;
}

@keyframes floatMain {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}

/* LAYOUT */
.main-layout {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:20px;
    padding-top:380px;
}

/* STREAM + CHAT */
.stream-container {
    width:65vw;
    max-width:1100px;
    aspect-ratio:16/9;
    border:3px solid #7e22ce;
    border-radius:12px;
    overflow:hidden;
    background:black;
    position:relative;
}

.stream-container iframe {
    width:100%;
    height:100%;
    border:none;
}

.chat-container {
    width:300px;
    height:65vh;
}

.chat-container iframe {
    width:100%;
    height:100%;
    border:2px solid #7e22ce;
}

/* PLAYER TITLE BAR */
.player-title {
    position:absolute;
    width:65vw;
    max-width:1100px;
    text-align:center;
    top:-35px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    z-index:2;
}

/* BULLETIN */
.bulletin {
    position:absolute;
    top:280px;
    width:100%;
    text-align:center;
    font-size:12px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
}

/* ADMIN BUTTON */
#adminBtn {
    position:absolute;
    top:320px;
    left:50%;
    transform:translateX(-50%);
    font-family:'Press Start 2P', monospace;
    color:#c084ff;
    background:transparent;
    border:2px solid #7e22ce;
    border-radius:6px;
    padding:6px 12px;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    cursor:pointer;
    z-index:2;
}

/* MOBILE */
@media(max-width:900px){
    .main-layout {flex-direction:column; padding-top:500px;}
    .stream-container {width:95vw;}
    .chat-container {width:95vw;height:400px;}
    .player-title {width:95vw;}
}

</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="title">SCORPION // THE // DEMON</div>

<div class="giratina-gif">
    <img class="clone left" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img id="giratinaImg" class="giratina-main" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img class="clone right" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
</div>

<div class="bulletin" id="bulletin">Welcome to the stream!</div>
<button id="adminBtn">Admin Log In</button>

<div class="main-layout">

    <div class="stream-container">
        <div id="playerContainer"></div>
        <div class="player-title" id="playerTitle">Loading...</div>
    </div>

    <div class="chat-container">
        <iframe id="chatFrame" src="https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io" allowfullscreen></iframe>

</div>

<script>
/* Twitch + YouTube playlist logic */

// credentials
const CLIENT_ID = "fiymv8n5jpz24y9xzj471pp1kvqvc5";
const CLIENT_SECRET = "9arqj32z9d5owge40cngaakm6fwa75";
const MAIN_CHANNEL = "scorpionthedemon";
const SMARTIES = [
  "peach","froggyhoppins","YokaSiri","KitsuAisu","DeliciaRin",
  "Boesschen","Nyansie","AquaGunn","imzenu","SunshiSunshu","Mookei"
];
const YOUTUBE_PLAYLIST_ID = "PLdFp7yyF5kzvjldbIzt-W8RlFNkywxhfe";

const playerTitle = document.getElementById("playerTitle");
const twitchChat = document.getElementById("chatFrame");
let currentStream = null, ytPlayer;

// load YouTube IFrame API
let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('playerContainer',{
        height:'100%',width:'100%',
        playerVars:{
            listType:'playlist',
            list:YOUTUBE_PLAYLIST_ID,
            autoplay:1,
            mute:1,
            controls:1
        },
        events:{
            'onReady':()=>{ playerTitle.textContent="YouTube Playlist"; },
        }
    });
}

// get Twitch access token
async function getAccessToken() {
    const res = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&grant_type=client_credentials`,{method:"POST"});
    const data = await res.json();
    return data.access_token;
}

async function checkLive(){
    try{
        const token = await getAccessToken();
        // first check main channel
        const primary = await fetch(`https://api.twitch.tv/helix/streams?user_login=${MAIN_CHANNEL}`,{
            headers:{"Client-ID":CLIENT_ID,"Authorization":`Bearer ${token}`}
        });
        const mainData = await primary.json();
        if(mainData.data && mainData.data.length>0){
            document.getElementById("playerContainer").innerHTML =
              `<iframe src="https://player.twitch.tv/?channel=${MAIN_CHANNEL}&parent=scorpionthedemon.github.io" allowfullscreen frameborder="0" width="100%" height="100%"></iframe>`;
            currentStream = MAIN_CHANNEL;
            playerTitle.textContent=`Twitch: ${MAIN_CHANNEL}`;
            twitchChat.src=`https://www.twitch.tv/embed/${MAIN_CHANNEL}/chat?parent=scorpionthedemon.github.io&darkpopout`;
            return;
        }
        // check smarties team
        for(let ch of SMARTIES){
            const st = await fetch(`https://api.twitch.tv/helix/streams?user_login=${ch}`,{
                headers:{"Client-ID":CLIENT_ID,"Authorization":`Bearer ${token}`}
            });
            const d = await st.json();
            if(d.data && d.data.length>0){
                document.getElementById("playerContainer").innerHTML =
                  `<iframe src="https://player.twitch.tv/?channel=${ch}&parent=scorpionthedemon.github.io" allowfullscreen frameborder="0" width="100%" height="100%"></iframe>`;
                currentStream = ch;
                playerTitle.textContent=`Live: ${ch}`;
                twitchChat.src=`https://www.twitch.tv/embed/${ch}/chat?parent=scorpionthedemon.github.io&darkpopout`;
                return;
            }
        }
        // none live → YouTube
        if(currentStream!=="youtube"){
            ytPlayer.playVideo();
            currentStream="youtube";
            playerTitle.textContent="YouTube Playlist";
            twitchChat.src=`https://www.twitch.tv/embed/${MAIN_CHANNEL}/chat?parent=scorpionthedemon.github.io&darkpopout`;
        }
    }catch(e){
        console.error(e);
    }
}

checkLive(); setInterval(checkLive,60000);

</script>

</body>
</html>
