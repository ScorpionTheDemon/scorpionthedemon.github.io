<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorpion The Demon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* RESET */
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
    background:black;
}

/* 🔥 DISTORTION WORLD BACKGROUND */
.bg {
    position:fixed;
    width:100%;
    height:100%;
    background: url("https://cdna.artstation.com/p/assets/images/images/037/369/240/large/caleb-waldrop-joey-mora-screenshot-107.jpg?1620203977") no-repeat center center;
    background-size: cover;
    z-index:-2;

    /* subtle movement */
    animation: drift 30s ease-in-out infinite alternate;
}

@keyframes drift {
    0% { transform: scale(1) translate(0px, 0px); }
    50% { transform: scale(1.03) translate(-10px, 10px); }
    100% { transform: scale(1.05) translate(10px, -10px); }
}

/* DARK OVERLAY (makes text readable + shadow vibe) */
.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
    z-index:-1;
}

/* TITLE */
.title {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
}

/* LAYOUT */
.main-layout {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:20px;
    padding-top:60px;
}

/* STREAM */
.stream-container {
    width:65vw;
    max-width:1100px;
    aspect-ratio:16/9;
    border:3px solid #7e22ce;
    border-radius:12px;
    overflow:hidden;
    background:black;

    box-shadow:
        0 0 30px rgba(168,85,247,0.5),
        inset 0 0 20px rgba(0,0,0,0.8);
}

.stream-container iframe {
    width:100%;
    height:100%;
    border:none;
}

/* CHAT */
.chat-container {
    width:300px;
    height:65vh;
}

.chat-container iframe {
    width:100%;
    height:100%;
    border:2px solid #7e22ce;
    background:black;
}

/* MOBILE */
@media(max-width:900px){
    .main-layout {
        flex-direction:column;
    }

    .stream-container {
        width:95vw;
    }

    .chat-container {
        width:95vw;
        height:400px;
    }
}

</style>
</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="title">
    SCORPION // THE // DEMON
</div>

<div class="main-layout">

    <!-- TWITCH STREAM -->
    <div class="stream-container">
        <iframe
            src="https://player.twitch.tv/?channel=scorpionthedemon&parent=scorpionthedemon.github.io"
            allowfullscreen>
        </iframe>
    </div>

    <!-- TWITCH CHAT -->
    <div class="chat-container">
        <iframe
            src="https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io">
        </iframe>
    </div>

</div>

</body>
</html>
