<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorpion The Demon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* RESET */
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
    background:black;
}

/* BACKGROUND */
.bg {
    position:fixed;
    width:110%;
    height:110%;
    top:-5%;
    left:-5%;
    background: url("https://cdna.artstation.com/p/assets/images/images/037/369/240/large/caleb-waldrop-joey-mora-screenshot-107.jpg?1620203977") no-repeat center center;
    background-size: cover;
    z-index:-2;
    animation: drift 30s ease-in-out infinite alternate;
    transition: transform 0.2s ease-out;
}

@keyframes drift {
    0% { transform: scale(1) translate(0px, 0px); }
    50% { transform: scale(1.03) translate(-10px, 10px); }
    100% { transform: scale(1.05) translate(10px, -10px); }
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
    z-index:-1;
}

/* TITLE */
.title {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
}

/* GIRATINA */
.giratina-gif {
    position:absolute;
    top:60px;
    width:100%;
    display:flex;
    justify-content:center;
}

.clone {
    position:absolute;
    width:180px;
    opacity:0.25;
    filter: blur(4px) drop-shadow(0 0 20px #7e22ce);
}

.clone.left {
    transform: translateX(-40px);
    animation: floatCloneLeft 7s ease-in-out infinite;
}

.clone.right {
    transform: translateX(40px);
    animation: floatCloneRight 8s ease-in-out infinite;
}

@keyframes floatCloneLeft {
    0% { transform: translateX(-40px) translateY(0); }
    50% { transform: translateX(-50px) translateY(-10px); }
    100% { transform: translateX(-40px) translateY(0); }
}

@keyframes floatCloneRight {
    0% { transform: translateX(40px) translateY(0); }
    50% { transform: translateX(50px) translateY(-12px); }
    100% { transform: translateX(40px) translateY(0); }
}

.giratina-main {
    width:180px;
    filter:
        drop-shadow(0 0 10px #a855f7)
        drop-shadow(0 0 25px #7e22ce);
    animation: floatMain 6s ease-in-out infinite;
}

@keyframes floatMain {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}

/* LAYOUT */
.main-layout {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    height:100vh;
    gap:20px;
    padding-top:280px; /* moved everything down for bulletin */
}

.stream-container {
    width:65vw;
    max-width:1100px;
    aspect-ratio:16/9;
    border:3px solid #7e22ce;
    border-radius:12px;
    overflow:hidden;
    background:black;
    position:relative;
}

.stream-container iframe {
    width:100%;
    height:100%;
    border:none;
}

.chat-container {
    width:300px;
    height:65vh;
}

.chat-container iframe {
    width:100%;
    height:100%;
    border:2px solid #7e22ce;
}

/* PLAYER TITLE BAR */
.player-title {
    position:absolute;
    width:65vw;
    max-width:1100px;
    text-align:center;
    top:-35px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    z-index:2;
}

/* BULLETIN */
.bulletin {
    position:absolute;
    top:180px; 
    width:100%;
    text-align:center;
    font-size:12px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
}

/* ADMIN BUTTON */
#adminBtn {
    position:absolute;
    top:220px;
    left:50%;
    transform:translateX(-50%);
    z-index:2;
}

/* MOBILE */
@media(max-width:900px){
    .main-layout {flex-direction:column; padding-top:400px;}
    .stream-container {width:95vw;}
    .chat-container {width:95vw;height:400px;}
    .player-title {width:95vw;}
}

</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="title">SCORPION // THE // DEMON</div>

<div class="giratina-gif">
    <img class="clone left" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img id="giratinaImg" class="giratina-main" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img class="clone right" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
</div>

<div class="bulletin" id="bulletin">Welcome to the stream!</div>
<button id="adminBtn">Admin Log In</button>

<div class="player-title" id="playerTitle">Loading...</div>

<div class="main-layout">

    <div class="stream-container">
        <div id="playerContainer"></div>
    </div>

    <div class="chat-container">
        <iframe id="chatFrame" src="https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io" allowfullscreen></iframe>
    </div>

</div>

<script>

/* Mouse reactive background */
const bg = document.getElementById("bg");
document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 30;
    const y = (e.clientY / window.innerHeight - 0.5) * 30;
    bg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
});

/* Bulletin live updates */
const bulletinDiv = document.getElementById("bulletin");
bulletinRef.on('value', snapshot => {
    const val = snapshot.val();
    if(val) bulletinDiv.textContent = val;
});

/* Admin login to update bulletin */
document.getElementById("adminBtn").addEventListener("click", () => {
    const pass = prompt("Enter admin password:");
    if(pass === PASSWORD){
        const msg = prompt("Enter new bulletin message:");
        if(msg) bulletinRef.set(msg);
    } else {
        alert("Incorrect password!");
    }
});

</script>

<script>
/* Twitch + YouTube playlist handling */
const CLIENT_ID = "fiymv8n5jpz24y9xzj471pp1kvqvc5";
const CLIENT_SECRET = "9arqj32z9d5owge40cngaakm6fwa75";
const MAIN_CHANNEL = "scorpionthedemon";
const FRIENDS = ["marggyonvt","idollplushie","uwoslab"];
const YOUTUBE_PLAYLIST_ID = "PLdFp7yyF5kzvjldbIzt-W8RlFNkywxhfe";

const playerTitle = document.getElementById("playerTitle");
const chatFrame = document.getElementById("chatFrame");

let currentStream = null; // current Twitch stream
let ytPlayer;

// Load YouTube IFrame API
let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

// Create YouTube player after API ready
function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('playerContainer', {
        height: '100%',
        width: '100%',
        playerVars: {
            listType:'playlist',
            list: YOUTUBE_PLAYLIST_ID,
            autoplay:1,
            mute:1,
            controls:1
        },
        events:{
            'onReady':() => {
                playerTitle.textContent = "YouTube Playlist";
            },
            'onStateChange': onYTStateChange
        }
    });
}

function onYTStateChange(event){
    if(event.data === YT.PlayerState.ENDED){
        // playlist automatically loops after last video
    }
}

/* Twitch check live */
async function getAccessToken() {
    const res = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&grant_type=client_credentials`, {
        method: "POST"
    });
    const data = await res.json();
    return data.access_token;
}

async function checkLive() {
    try{
        const token = await getAccessToken();
        let allChannels = [MAIN_CHANNEL, ...FRIENDS];
        for(let ch of allChannels){
            const res = await fetch(`https://api.twitch.tv/helix/streams?user_login=${ch}`,{
                headers:{
                    "Client-ID": CLIENT_ID,
                    "Authorization": `Bearer ${token}`
                }
            });
            const data = await res.json();
            if(data.data && data.data.length>0){
                // switch to this Twitch stream if not already playing
                if(currentStream !== ch){
                    document.getElementById('playerContainer').innerHTML = `<iframe src="https://player.twitch.tv/?channel=${ch}&parent=scorpionthedemon.github.io" allowfullscreen frameborder="0" width="100%" height="100%"></iframe>`;
                    currentStream = ch;
                    playerTitle.textContent = ch + "'s Twitch Stream";
                    chatFrame.src = `https://www.twitch.tv/embed/${ch}/chat?parent=scorpionthedemon.github.io&darkpopout`;
                }
                return; // stop at first live stream
            }
        }
        // no Twitch streams live: switch to YouTube
        if(currentStream !== "youtube"){
            ytPlayer.playVideo();
            currentStream = "youtube";
            playerTitle.textContent = "YouTube Playlist";
            chatFrame.src = `https://www.twitch.tv/embed/${MAIN_CHANNEL}/chat?parent=scorpionthedemon.github.io&darkpopout`;
        }
    } catch(err){
        console.error(err);
        if(currentStream !== "youtube"){
            ytPlayer.playVideo();
            currentStream = "youtube";
            playerTitle.textContent = "YouTube Playlist";
            chatFrame.src = `https://www.twitch.tv/embed/${MAIN_CHANNEL}/chat?parent=scorpionthedemon.github.io&darkpopout`;
        }
    }
}

setInterval(checkLive, 60000);
checkLive();

</script>
</body>
</html>
