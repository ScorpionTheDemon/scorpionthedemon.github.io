<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scorpion The Demon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <!-- DISTORTION WORLD BACKGROUND -->
    <canvas id="distortionCanvas"></canvas>

    <!-- TITLE -->
    <div class="title">
        SCORPION // THE // DEMON
    </div>

    <div class="main-layout">

        <!-- STREAM -->
        <div class="stream-container">
            <iframe
                id="twitchStream"
                src="https://player.twitch.tv/?channel=scorpionthedemon&parent=scorpionthedemon.github.io"
                allowfullscreen>
            </iframe>
        </div>

        <!-- Twitch Chat -->
        <div class="chat-container">
            <iframe
                src="https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io">
            </iframe>
        </div>

    </div>

    <!-- DISTORTION WORLD AMBIENT -->
    <audio id="distortionLoop" loop>
        <source src="distortion_world_ambient.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1️⃣ Handle ambient audio autoplay with user interaction
        const ambient = document.getElementById('distortionLoop');
        const twitchIframe = document.getElementById('twitchStream');

        const startAmbient = () => {
            ambient.play().catch(() => console.log("Ambient blocked, waiting for interaction"));
            window.removeEventListener('click', startAmbient);
        };
        window.addEventListener('click', startAmbient);

        // 2️⃣ Mute ambient while Twitch stream is loaded
        twitchIframe.onload = () => {
            ambient.muted = true;
        };

        // 3️⃣ Auto-resume ambient if Twitch is not live / iframe not accessible
        setInterval(() => {
            try {
                const doc = twitchIframe.contentWindow.document;
                // if accessible, Twitch likely live -> mute
                ambient.muted = true;
            } catch(e) {
                // Cross-origin access blocked -> Twitch not live? Resume
                if (ambient.paused) {
                    ambient.muted = false;
                    ambient.play().catch(() => console.log("Ambient resume blocked"));
                }
            }
        }, 5000);

        // 4️⃣ Dynamic Distortion World background
        const canvas = document.getElementById('distortionCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const tendrils = [];
        const NUM_TENDRILS = 25;

        class Tendril {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 50 + Math.random() * 100;
                this.speedX = -0.2 + Math.random() * 0.4;
                this.speedY = -0.2 + Math.random() * 0.4;
                this.angle = Math.random() * Math.PI * 2;
                this.angularSpeed = 0.001 + Math.random() * 0.003;
                this.opacity = 0.05 + Math.random() * 0.1;
                this.color = `rgba(168,85,247,${this.opacity})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.angle += this.angularSpeed;
                if(this.x < -100 || this.x > canvas.width + 100 || this.y < -100 || this.y > canvas.height + 100) {
                    this.reset();
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x + Math.sin(this.angle)*30, this.y + Math.cos(this.angle)*30, this.size, 0, Math.PI*2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        for(let i=0;i<NUM_TENDRILS;i++) tendrils.push(new Tendril());

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            tendrils.forEach(t=>{t.update();t.draw();});
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

</body>
</html>
