<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorpion The Demon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* RESET */
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family:'Press Start 2P', monospace;
    overflow-x:hidden;
    background:black;
}

/* BACKGROUND */
.bg {
    position:fixed;
    width:110%;
    height:110%;
    top:-5%;
    left:-5%;
    background: url("https://cdna.artstation.com/p/assets/images/images/037/369/240/large/caleb-waldrop-joey-mora-screenshot-107.jpg?1620203977") no-repeat center center;
    background-size: cover;
    z-index:-2;
    animation: drift 30s ease-in-out infinite alternate;
    transition: transform 0.2s ease-out;
}

@keyframes drift {
    0% { transform: scale(1) translate(0px, 0px); }
    50% { transform: scale(1.03) translate(-10px, 10px); }
    100% { transform: scale(1.05) translate(10px, -10px); }
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
    z-index:-1;
}

/* TITLE */
.title {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    z-index:2;
}

/* GIRATINA */
.giratina-gif {
    position:absolute;
    top:60px;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:1;
}

.clone {
    position:absolute;
    width:180px;
    opacity:0.25;
    filter: blur(4px) drop-shadow(0 0 20px #7e22ce);
}

.clone.left {
    transform: translateX(-40px);
    animation: floatCloneLeft 7s ease-in-out infinite;
}

.clone.right {
    transform: translateX(40px);
    animation: floatCloneRight 8s ease-in-out infinite;
}

@keyframes floatCloneLeft {
    0% { transform: translateX(-40px) translateY(0); }
    50% { transform: translateX(-50px) translateY(-10px); }
    100% { transform: translateX(-40px) translateY(0); }
}

@keyframes floatCloneRight {
    0% { transform: translateX(40px) translateY(0); }
    50% { transform: translateX(50px) translateY(-12px); }
    100% { transform: translateX(40px) translateY(0); }
}

.giratina-main {
    width:180px;
    filter:
        drop-shadow(0 0 10px #a855f7)
        drop-shadow(0 0 25px #7e22ce);
    animation: floatMain 6s ease-in-out infinite;
}

/* BULLETIN & ADMIN */
.bulletin {
    position:absolute;
    top:260px; /* space below Giratina */
    width:100%;
    text-align:center;
    font-size:14px;
    letter-spacing:2px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    z-index:2;
    padding:5px 0;
}

#adminBtn {
    position:absolute;
    top:290px; /* directly below bulletin */
    left:50%;
    transform:translateX(-50%);
    font-family:'Press Start 2P', monospace;
    font-size:12px;
    background:transparent;
    color:#c084ff;
    border:2px solid #7e22ce;
    border-radius:6px;
    padding:6px 10px;
    cursor:pointer;
    z-index:2;
}

/* PLAYER TITLE */
.player-title {
    text-align:center;
    font-size:14px;
    letter-spacing:2px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    margin-top:350px; /* below bulletin & admin button */
    z-index:2;
    position:relative;
}

/* LAYOUT */
.main-layout {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:20px;
    padding-top:10px;
    margin-top:10px;
    z-index:1;
}

.stream-container {
    width:65vw;
    max-width:1100px;
    aspect-ratio:16/9;
    border:3px solid #7e22ce;
    border-radius:12px;
    overflow:hidden;
    background:black;
}

.stream-container iframe {
    width:100%;
    height:100%;
    border:none;
    z-index:1;
}

.chat-container {
    width:300px;
    height:65vh;
}

.chat-container iframe {
    width:100%;
    height:100%;
    border:2px solid #7e22ce;
    z-index:1;
}

/* MOBILE */
@media(max-width:900px){
    .main-layout {
        flex-direction:column;
        align-items:center;
        gap:15px;
        padding-top:0;
    }
    .stream-container {width:95vw;}
    .chat-container {width:95vw;height:400px;margin-top:10px;}
    .player-title {margin-top:10px;}
    #adminBtn {top:330px;}
    .bulletin {top:300px;}
}

</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="title">SCORPION // THE // DEMON</div>

<div class="giratina-gif">
    <img class="clone left" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img id="giratinaImg" class="giratina-main" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img class="clone right" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
</div>

<div class="bulletin" id="bulletin">Welcome to the stream!</div>
<button id="adminBtn">Admin Log In</button>

<div class="player-title" id="playerTitle">Currently Playing: YouTube Playlist</div>

<div class="main-layout">
    <div class="stream-container">
        <iframe id="mainPlayer" allowfullscreen></iframe>
    </div>
    <div class="chat-container">
        <iframe id="twitchChat" src="" allowfullscreen></iframe>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB2cWCYGCDJuSaBpgbm0Mpu7-Q8ucsLGEA",
  authDomain: "scorpionthedemon-website.firebaseapp.com",
  databaseURL: "https://scorpionthedemon-website-default-rtdb.firebaseio.com",
  projectId: "scorpionthedemon-website",
  storageBucket: "scorpionthedemon-website.firebasestorage.app",
  messagingSenderId: "1013538876770",
  appId: "1:1013538876770:web:88874fecec0b606e14503b",
  measurementId: "G-FDDRD74GM1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const bulletinRef = db.ref("bulletin/message");

// Update bulletin live
bulletinRef.on("value", (snapshot) => {
    const val = snapshot.val();
    if(val) document.getElementById("bulletin").innerText = val;
});
</script>

<script>

/* Mouse reactive background */
const bg = document.getElementById("bg");
document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 30;
    const y = (e.clientY / window.innerHeight - 0.5) * 30;
    bg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
});

/* Twitch + YouTube switching with friends */
const CLIENT_ID = "fiymv8n5jpz24y9xzj471pp1kvqvc5";
const CLIENT_SECRET = "9arqj32z9d5owge40cngaakm6fwa75";

const CHANNELS = [
    "scorpionthedemon",
    "marggyonvt",
    "idollplushie",
    "uwoslab"
];

// Fixed YouTube playlist embed to loop correctly after last video
const YOUTUBE_EMBED = "https://www.youtube.com/embed/videoseries?list=PLdFp7yyF5kzvjldbIzt-W8RlFNkywxhfe&autoplay=1&mute=1&loop=1";

const player = document.getElementById("mainPlayer");
const playerTitle = document.getElementById("playerTitle");
const twitchChat = document.getElementById("twitchChat");

async function getAccessToken() {
    const res = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&grant_type=client_credentials`, {
        method: "POST"
    });
    const data = await res.json();
    return data.access_token;
}

async function checkLive() {
    try {
        const token = await getAccessToken();
        let foundLive = false;

        for (let ch of CHANNELS) {
            const res = await fetch(`https://api.twitch.tv/helix/streams?user_login=${ch}`, {
                headers: {
                    "Client-ID": CLIENT_ID,
                    "Authorization": `Bearer ${token}`
                }
            });
            const data = await res.json();
            if (data.data && data.data.length > 0) {
                player.src = `https://player.twitch.tv/?channel=${ch}&parent=scorpionthedemon.github.io`;
                playerTitle.innerText = `Currently Playing: Twitch Stream - ${ch}`;
                // Show chat for this streamer
                if(ch === "scorpionthedemon") {
                    twitchChat.src = `https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io&darkpopout`;
                } else {
                    twitchChat.src = `https://www.twitch.tv/embed/${ch}/chat?parent=scorpionthedemon.github.io&darkpopout`;
                }
                foundLive = true;
                break;
            }
        }

        if (!foundLive) {
            player.src = YOUTUBE_EMBED;
            playerTitle.innerText = "Currently Playing: YouTube Playlist";
            // Use ScorpionTheDemon chat for YouTube
            twitchChat.src = `https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io&darkpopout`;
        }

    } catch(err) {
        console.error(err);
        player.src = YOUTUBE_EMBED;
        playerTitle.innerText = "Currently Playing: YouTube Playlist";
        twitchChat.src = `https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io&darkpopout`;
    }
}

// initial check + interval
checkLive();
setInterval(checkLive, 60000);

/* Admin Bulletin */
const adminBtn = document.getElementById("adminBtn");
adminBtn.addEventListener("click", () => {
    const pwd = prompt("Enter Admin Password:");
    if(pwd === "Colvin12.") {
        const newMsg = prompt("Enter new bulletin message:");
        if(newMsg) bulletinRef.set(newMsg);
    } else {
        alert("Incorrect password.");
    }
});
</script>

</body>
</html>
