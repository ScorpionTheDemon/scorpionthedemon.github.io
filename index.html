<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorpion The Demon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* RESET */
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
    background:black;
}

/* BACKGROUND */
.bg {
    position:fixed;
    width:110%;
    height:110%;
    top:-5%;
    left:-5%;
    background: url("https://cdna.artstation.com/p/assets/images/images/037/369/240/large/caleb-waldrop-joey-mora-screenshot-107.jpg?1620203977") no-repeat center center;
    background-size: cover;
    z-index:-2;
    animation: drift 30s ease-in-out infinite alternate;
    transition: transform 0.2s ease-out;
}

@keyframes drift {
    0% { transform: scale(1) translate(0px, 0px); }
    50% { transform: scale(1.03) translate(-10px, 10px); }
    100% { transform: scale(1.05) translate(10px, -10px); }
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
    z-index:-1;
}

/* TITLE */
.title {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
}

/* GIRATINA */
.giratina-gif {
    position:absolute;
    top:60px;
    width:100%;
    display:flex;
    justify-content:center;
}

.clone {
    position:absolute;
    width:180px;
    opacity:0.25;
    filter: blur(4px) drop-shadow(0 0 20px #7e22ce);
}

.clone.left {
    transform: translateX(-40px);
    animation: floatCloneLeft 7s ease-in-out infinite;
}

.clone.right {
    transform: translateX(40px);
    animation: floatCloneRight 8s ease-in-out infinite;
}

@keyframes floatCloneLeft {
    0% { transform: translateX(-40px) translateY(0); }
    50% { transform: translateX(-50px) translateY(-10px); }
    100% { transform: translateX(-40px) translateY(0); }
}

@keyframes floatCloneRight {
    0% { transform: translateX(40px) translateY(0); }
    50% { transform: translateX(50px) translateY(-12px); }
    100% { transform: translateX(40px) translateY(0); }
}

.giratina-main {
    width:180px;
    filter:
        drop-shadow(0 0 10px #a855f7)
        drop-shadow(0 0 25px #7e22ce);
    animation: floatMain 6s ease-in-out infinite;
}

@keyframes floatMain {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}

/* BULLETIN */
.bulletin {
    position:absolute;
    top:280px;
    width:100%;
    text-align:center;
    font-size:12px;
    color:#c084ff;
    letter-spacing:2px;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    z-index:1;
}

/* PLAYER TITLE */
.player-title {
    position:absolute;
    width:100%;
    text-align:center;
    font-size:12px;
    color:#c084ff;
    letter-spacing:2px;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
    top:320px;
}

/* ADMIN BUTTON */
#adminButton {
    position:absolute;
    top:250px;
    left:50%;
    transform:translateX(-50%);
    font-family:'Press Start 2P', monospace;
    color:#c084ff;
    background:black;
    border:3px solid #7e22ce;
    padding:5px 10px;
    cursor:pointer;
    z-index:1;
}

/* LAYOUT */
.main-layout {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    height:calc(100vh - 360px);
    gap:20px;
    padding-top:360px;
}

.stream-container {
    width:65vw;
    max-width:1100px;
    aspect-ratio:16/9;
    border:3px solid #7e22ce;
    border-radius:12px;
    overflow:hidden;
    background:black;
}

.stream-container iframe {
    width:100%;
    height:100%;
    border:none;
}

.chat-container {
    width:300px;
    height:65vh;
}

.chat-container iframe {
    width:100%;
    height:100%;
    border:2px solid #7e22ce;
}

/* MOBILE */
@media(max-width:900px){
    .main-layout {flex-direction:column; padding-top:400px;}
    .stream-container {width:95vw;}
    .chat-container {width:95vw;height:400px;}
    .bulletin {top:320px;}
    .player-title {top:360px;}
    #adminButton {top:300px;}
}

</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="title">SCORPION // THE // DEMON</div>

<div class="giratina-gif">
    <img class="clone left" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img id="giratinaImg" class="giratina-main" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img class="clone right" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
</div>

<div class="bulletin" id="bulletin">No messages currently</div>
<button id="adminButton">Admin Log In</button>
<div class="player-title" id="playerTitle">Loading...</div>

<div class="main-layout">

    <div class="stream-container">
        <iframe id="mainPlayer" allowfullscreen></iframe>
    </div>

    <div class="chat-container">
        <iframe id="chatFrame"></iframe>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
/* Mouse reactive background */
const bg = document.getElementById("bg");
document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 30;
    const y = (e.clientY / window.innerHeight - 0.5) * 30;
    bg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
});

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB2cWCYGCDJuSaBpgbm0Mpu7-Q8ucsLGEA",
  authDomain: "scorpionthedemon-website.firebaseapp.com",
  databaseURL: "https://scorpionthedemon-website-default-rtdb.firebaseio.com",
  projectId: "scorpionthedemon-website",
  storageBucket: "scorpionthedemon-website.firebasestorage.app",
  messagingSenderId: "1013538876770",
  appId: "1:1013538876770:web:88874fecec0b606e14503b",
  measurementId: "G-FDDRD74GM1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Bulletin updates
const bulletinEl = document.getElementById("bulletin");
db.ref('bulletin').on('value', (snapshot) => {
    const msg = snapshot.val();
    bulletinEl.textContent = msg || "No messages currently";
});

// Admin login and update
const adminBtn = document.getElementById("adminButton");
adminBtn.addEventListener("click", () => {
    const password = prompt("Enter admin password:");
    if(password === "Colvin12.") {
        const newMsg = prompt("Enter bulletin message:");
        if(newMsg !== null) {
            db.ref('bulletin').set(newMsg);
        }
    } else {
        alert("Incorrect password.");
    }
});

/* Twitch + YouTube switching */
const CLIENT_ID = "fiymv8n5jpz24y9xzj471pp1kvqvc5";
const CLIENT_SECRET = "9arqj32z9d5owge40cngaakm6fwa75";

const CHANNELS_PRIORITY = [
    "scorpionthedemon",
    "mookei",
    "SmartiesBoby",
    "SmartiesLara",
    "SmartiesNeko",
    "SmartiesVivi"
];

const player = document.getElementById("mainPlayer");
const chatFrame = document.getElementById("chatFrame");
const playerTitle = document.getElementById("playerTitle");

const YOUTUBE_PLAYLIST = "PLdFp7yyF5kzvjldbIzt-W8RlFNkywxhfe";

function getTwitchEmbed(channel) {
    return `https://player.twitch.tv/?channel=${channel}&parent=scorpionthedemon.github.io`;
}

function getChatEmbed(channel) {
    return `https://www.twitch.tv/embed/${channel}/chat?parent=scorpionthedemon.github.io&darkpopout`;
}

// YouTube embed with proper loop
function getYoutubeEmbed() {
    return `https://www.youtube.com/embed?listType=playlist&list=${YOUTUBE_PLAYLIST}&autoplay=1&mute=1&loop=1&playlist=${YOUTUBE_PLAYLIST}`;
}

async function getAccessToken() {
    const res = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&grant_type=client_credentials`, {method:"POST"});
    const data = await res.json();
    return data.access_token;
}

async function checkLive() {
    try {
        const token = await getAccessToken();
        for(const channel of CHANNELS_PRIORITY) {
            const res = await fetch(`https://api.twitch.tv/helix/streams?user_login=${channel}`, {
                headers: {
                    "Client-ID": CLIENT_ID,
                    "Authorization": `Bearer ${token}`
                }
            });
            const data = await res.json();
            if(data.data && data.data.length > 0) {
                player.src = getTwitchEmbed(channel);
                chatFrame.src = getChatEmbed(channel);
                playerTitle.textContent = `Live on Twitch: ${channel}`;
                return;
            }
        }
        // No Twitch live channels, play YouTube
        player.src = getYoutubeEmbed();
        chatFrame.src = getChatEmbed("scorpionthedemon");
        playerTitle.textContent = "Playing YouTube Playlist";
    } catch(err) {
        console.error(err);
        player.src = getYoutubeEmbed();
        chatFrame.src = getChatEmbed("scorpionthedemon");
        playerTitle.textContent = "Playing YouTube Playlist";
    }
}

checkLive();
setInterval(checkLive, 60000);

</script>

</body>
</html>
