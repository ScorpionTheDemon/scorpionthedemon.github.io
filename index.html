<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scorpion The Demon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <!-- DISTORTION WORLD CANVAS BACKGROUND -->
    <canvas id="distortionCanvas"></canvas>

    <!-- TITLE -->
    <div class="title">
        SCORPION // THE // DEMON
    </div>

    <div class="main-layout">

        <!-- STREAM -->
        <div class="stream-container">
            <iframe
                id="twitchStream"
                src="https://player.twitch.tv/?channel=scorpionthedemon&parent=scorpionthedemon.github.io"
                allowfullscreen>
            </iframe>
        </div>

        <!-- Twitch Chat -->
        <div class="chat-container">
            <iframe
                src="https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io">
            </iframe>
        </div>

    </div>

    <!-- DISTORTION WORLD AMBIENT -->
    <audio id="distortionLoop" loop>
        <source src="distortion_world_ambient.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- Ambient Music ---
        const ambient = document.getElementById('distortionLoop');
        const twitchIframe = document.getElementById('twitchStream');

        const startAmbient = () => {
            ambient.play().catch(()=>console.log("Ambient autoplay blocked."));
            window.removeEventListener('click', startAmbient);
        };
        window.addEventListener('click', startAmbient);

        twitchIframe.onload = () => {
            ambient.muted = true;
        };

        setInterval(() => {
            try {
                const doc = twitchIframe.contentWindow.document;
                ambient.muted = true;
            } catch(e) {
                if(ambient.paused){
                    ambient.muted = false;
                    ambient.play().catch(()=>console.log("Ambient resume blocked"));
                }
            }
        }, 5000);

        // --- Distortion World Tendrils ---
        const canvas = document.getElementById('distortionCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Tendril {
            constructor(){
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.length = 200 + Math.random()*300;
                this.angle = Math.random()*Math.PI*2;
                this.speed = 0.005 + Math.random()*0.01;
                this.opacity = 0.05 + Math.random()*0.1;
                this.width = 2 + Math.random()*4;
            }
            update(){
                this.angle += this.speed;
                this.x += Math.sin(this.angle)*0.5;
                this.y += Math.cos(this.angle)*0.5;
                // wrap around screen
                if(this.x < -this.length) this.x = canvas.width + this.length;
                if(this.x > canvas.width + this.length) this.x = -this.length;
                if(this.y < -this.length) this.y = canvas.height + this.length;
                if(this.y > canvas.height + this.length) this.y = -this.length;
            }
            draw(){
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                const endX = this.x + Math.sin(this.angle)*this.length;
                const endY = this.y + Math.cos(this.angle)*this.length;
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = `rgba(168,85,247,${this.opacity})`;
                ctx.lineWidth = this.width;
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(180,100,255,0.5)';
                ctx.stroke();
            }
        }

        const tendrils = [];
        const NUM_TENDRILS = 30;
        for(let i=0;i<NUM_TENDRILS;i++) tendrils.push(new Tendril());

        function animate(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            tendrils.forEach(t=>{t.update();t.draw();});
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', ()=>{
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

</body>
</html>
