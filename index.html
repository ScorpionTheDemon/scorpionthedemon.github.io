<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorpion The Demon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* RESET */
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
    background:black;
}

/* 🔥 BACKGROUND */
.bg {
    position:fixed;
    width:110%;
    height:110%;
    top:-5%;
    left:-5%;
    background: url("https://cdna.artstation.com/p/assets/images/images/037/369/240/large/caleb-waldrop-joey-mora-screenshot-107.jpg?1620203977") no-repeat center center;
    background-size: cover;
    z-index:-2;
    animation: drift 30s ease-in-out infinite alternate;
    transition: transform 0.2s ease-out;
}

@keyframes drift {
    0% { transform: scale(1) translate(0px, 0px); }
    50% { transform: scale(1.03) translate(-10px, 10px); }
    100% { transform: scale(1.05) translate(10px, -10px); }
}

/* OVERLAY */
.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
    z-index:-1;
}

/* TITLE */
.title {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
}

/* 🔥 GIRATINA CONTAINER */
.giratina-gif {
    position:absolute;
    top:60px;
    width:100%;
    display:flex;
    justify-content:center;
    pointer-events:none;
}

/* SHADOW CLONES */
.clone {
    position:absolute;
    width:180px;
    max-width:40vw;
    opacity:0.25;
    filter: blur(4px) drop-shadow(0 0 20px #7e22ce);
}

/* left clone */
.clone.left {
    transform: translateX(-40px) scale(1.05);
    animation: floatCloneLeft 7s ease-in-out infinite;
}

/* right clone */
.clone.right {
    transform: translateX(40px) scale(1.05);
    animation: floatCloneRight 8s ease-in-out infinite;
}

@keyframes floatCloneLeft {
    0% { transform: translateX(-40px) translateY(0px); }
    50% { transform: translateX(-50px) translateY(-10px); }
    100% { transform: translateX(-40px) translateY(0px); }
}

@keyframes floatCloneRight {
    0% { transform: translateX(40px) translateY(0px); }
    50% { transform: translateX(50px) translateY(-12px); }
    100% { transform: translateX(40px) translateY(0px); }
}

/* MAIN GIRATINA */
.giratina-main {
    width:180px;
    max-width:40vw;
    opacity:0.95;

    filter:
        drop-shadow(0 0 10px #a855f7)
        drop-shadow(0 0 25px #7e22ce);

    animation: floatMain 6s ease-in-out infinite;
}

@keyframes floatMain {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0px); }
}

/* LAYOUT */
.main-layout {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:20px;
    padding-top:140px;
}

/* STREAM */
.stream-container {
    width:65vw;
    max-width:1100px;
    aspect-ratio:16/9;
    border:3px solid #7e22ce;
    border-radius:12px;
    overflow:hidden;
    background:black;

    box-shadow:
        0 0 30px rgba(168,85,247,0.5),
        inset 0 0 20px rgba(0,0,0,0.8);
}

.stream-container iframe {
    width:100%;
    height:100%;
    border:none;
}

/* CHAT */
.chat-container {
    width:300px;
    height:65vh;
}

.chat-container iframe {
    width:100%;
    height:100%;
    border:2px solid #7e22ce;
    background:black;
}

/* MOBILE */
@media(max-width:900px){
    .main-layout {
        flex-direction:column;
        padding-top:160px;
    }

    .stream-container {
        width:95vw;
    }

    .chat-container {
        width:95vw;
        height:400px;
    }
}

</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="title">
    SCORPION // THE // DEMON
</div>

<!-- 🔥 GIRATINA + SHADOW CLONES -->
<div class="giratina-gif">

    <img class="clone left"
         src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">

    <img id="giratinaImg"
         class="giratina-main"
         src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif"
         alt="Giratina">

    <img class="clone right"
         src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">

</div>

<div class="main-layout">

    <!-- STREAM -->
    <div class="stream-container">
        <iframe
            src="https://player.twitch.tv/?channel=scorpionthedemon&parent=scorpionthedemon.github.io"
            allowfullscreen>
        </iframe>
    </div>

    <!-- CHAT -->
    <div class="chat-container">
        <iframe
            src="https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io">
        </iframe>
    </div>

</div>

<script>
/* Mouse reactive background */
const bg = document.getElementById("bg");

document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 30;
    const y = (e.clientY / window.innerHeight - 0.5) * 30;

    bg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
});

/* Fallback image */
const img = document.getElementById("giratinaImg");
img.onerror = () => {
    img.src = "https://play.pokemonshowdown.com/sprites/gen5ani/giratina-origin.gif";
};
</script>

</body>
</html>
