<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorpion The Demon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* RESET */
* {margin:0; padding:0; box-sizing:border-box;}
body {
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
    background:black;
}

/* BACKGROUND */
.bg {
    position:fixed;
    width:110%;
    height:110%;
    top:-5%;
    left:-5%;
    background: url("https://cdna.artstation.com/p/assets/images/images/037/369/240/large/caleb-waldrop-joey-mora-screenshot-107.jpg?1620203977") no-repeat center center;
    background-size: cover;
    z-index:-2;
    animation: drift 30s ease-in-out infinite alternate;
    transition: transform 0.2s ease-out;
}

@keyframes drift {
    0% { transform: scale(1) translate(0px, 0px); }
    50% { transform: scale(1.03) translate(-10px, 10px); }
    100% { transform: scale(1.05) translate(10px, -10px); }
}

.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
    z-index:-1;
}

/* TITLE */
.title {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    letter-spacing:3px;
    color:#c084ff;
    text-shadow:
        0 0 5px #a855f7,
        0 0 15px #7e22ce,
        0 0 30px #4c1d95;
}

/* GIRATINA */
.giratina-gif {
    position:absolute;
    top:60px;
    width:100%;
    display:flex;
    justify-content:center;
}

.clone {
    position:absolute;
    width:180px;
    opacity:0.25;
    filter: blur(4px) drop-shadow(0 0 20px #7e22ce);
}

.clone.left {
    transform: translateX(-40px);
    animation: floatCloneLeft 7s ease-in-out infinite;
}

.clone.right {
    transform: translateX(40px);
    animation: floatCloneRight 8s ease-in-out infinite;
}

@keyframes floatCloneLeft {
    0% { transform: translateX(-40px) translateY(0); }
    50% { transform: translateX(-50px) translateY(-10px); }
    100% { transform: translateX(-40px) translateY(0); }
}

@keyframes floatCloneRight {
    0% { transform: translateX(40px) translateY(0); }
    50% { transform: translateX(50px) translateY(-12px); }
    100% { transform: translateX(40px) translateY(0); }
}

.giratina-main {
    width:180px;
    filter:
        drop-shadow(0 0 10px #a855f7)
        drop-shadow(0 0 25px #7e22ce);
    animation: floatMain 6s ease-in-out infinite;
}

@keyframes floatMain {
    0% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0); }
}

/* LAYOUT */
.main-layout {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    height:100vh;
    gap:20px;
    padding-top:280px; /* pushed lower to accommodate Giratina and bulletin */
}

.stream-section {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
}

.player-title {
    text-align:center;
    font-size:12px;
    letter-spacing:2px;
    color:#c084ff;
    text-shadow:
        0 0 3px #a855f7,
        0 0 10px #7e22ce,
        0 0 15px #4c1d95;
}

.stream-container {
    width:65vw;
    max-width:1100px;
    aspect-ratio:16/9;
    border:3px solid #7e22ce;
    border-radius:12px;
    overflow:hidden;
    background:black;
}

.stream-container iframe {
    width:100%;
    height:100%;
    border:none;
}

.chat-container {
    width:300px;
    height:65vh;
}

.chat-container iframe {
    width:100%;
    height:100%;
    border:2px solid #7e22ce;
}

/* BULLETIN */
.bulletin {
    width:70vw;
    max-width:1100px;
    padding:10px 15px;
    font-size:12px;
    text-align:center;
    color:#c084ff;
    text-shadow:
        0 0 3px #a855f7,
        0 0 10px #7e22ce,
        0 0 15px #4c1d95;
    border:2px solid #7e22ce;
    border-radius:8px;
    background:rgba(0,0,0,0.6);
}

/* ADMIN BUTTON */
#adminBtn {
    margin-top:5px;
    padding:5px 10px;
    font-family:'Press Start 2P', monospace;
    font-size:10px;
    color:#c084ff;
    background:black;
    border:2px solid #7e22ce;
    border-radius:6px;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){
    .main-layout {flex-direction:column; padding-top:320px;}
    .stream-container {width:95vw;}
    .chat-container {width:95vw;height:400px;}
    .bulletin {width:95vw;}
}

</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div class="title">SCORPION // THE // DEMON</div>

<div class="giratina-gif">
    <img class="clone left" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img id="giratinaImg" class="giratina-main" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
    <img class="clone right" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/487.gif">
</div>

<div class="main-layout">

    <div class="stream-section">

        <!-- Bulletin -->
        <div class="bulletin" id="bulletin">Welcome to the stream!</div>

        <!-- Admin Log In -->
        <button id="adminBtn">Admin Log In</button>

        <!-- Player title -->
        <div class="player-title" id="playerTitle">Loading...</div>

        <!-- Player -->
        <div class="stream-container">
            <iframe id="mainPlayer" allowfullscreen></iframe>
        </div>

    </div>

    <!-- Chat -->
    <div class="chat-container">
        <iframe id="chatFrame" src="https://www.twitch.tv/embed/scorpionthedemon/chat?parent=scorpionthedemon.github.io&darkpopout" allowfullscreen></iframe>
    </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB2cWCYGCDJuSaBpgbm0Mpu7-Q8ucsLGEA",
  authDomain: "scorpionthedemon-website.firebaseapp.com",
  databaseURL: "https://scorpionthedemon-website-default-rtdb.firebaseio.com",
  projectId: "scorpionthedemon-website",
  storageBucket: "scorpionthedemon-website.firebasestorage.app",
  messagingSenderId: "1013538876770",
  appId: "1:1013538876770:web:88874fecec0b606e14503b",
  measurementId: "G-FDDRD74GM1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Bulletin live update
const bulletinEl = document.getElementById("bulletin");
db.ref('bulletin').on('value', (snapshot) => {
    const val = snapshot.val();
    if(val) bulletinEl.textContent = val;
});

// Admin password logic
const adminBtn = document.getElementById("adminBtn");
adminBtn.addEventListener('click', () => {
    const pw = prompt("Enter Admin Password:");
    if(pw === "Colvin12.") {
        const newMsg = prompt("Enter new bulletin message:");
        if(newMsg) db.ref('bulletin').set(newMsg);
    } else {
        alert("Incorrect password.");
    }
});

/* Mouse reactive background */
const bg = document.getElementById("bg");
document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 30;
    const y = (e.clientY / window.innerHeight - 0.5) * 30;
    bg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
});

/* Twitch + YouTube player switching with chat sync */
const CLIENT_ID = "fiymv8n5jpz24y9xzj471pp1kvqvc5";
const CLIENT_SECRET = "9arqj32z9d5owge40cngaakm6fwa75";
const MAIN_CHANNEL = "scorpionthedemon";
const TEAM_NAME = "smarties";
const EXTRA_CHANNELS = ["mookei"];

const twitchEmbed = (channel) => `https://player.twitch.tv/?channel=${channel}&parent=scorpionthedemon.github.io`;
const twitchChat = (channel) => `https://www.twitch.tv/embed/${channel}/chat?parent=scorpionthedemon.github.io&darkpopout`;

const youtubeEmbed = "https://www.youtube.com/embed?listType=playlist&list=PLdFp7yyF5kzvjldbIzt-W8RlFNkywxhfe&autoplay=1&mute=1&loop=1&playlist=PLdFp7yyF5kzvjldbIzt-W8RlFNkywxhfe";

const player = document.getElementById("mainPlayer");
const chatFrame = document.getElementById("chatFrame");
const playerTitle = document.getElementById("playerTitle");

async function getAccessToken() {
    const res = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&grant_type=client_credentials`, {
        method: "POST"
    });
    const data = await res.json();
    return data.access_token;
}

async function checkStreams() {
    try {
        const token = await getAccessToken();
        // Channels to check in priority order
        const channels = [MAIN_CHANNEL, ...EXTRA_CHANNELS];

        // First, check MAIN_CHANNEL
        const resMain = await fetch(`https://api.twitch.tv/helix/streams?user_login=${MAIN_CHANNEL}`, {
            headers: {"Client-ID": CLIENT_ID, "Authorization": `Bearer ${token}`}
        });
        const dataMain = await resMain.json();

        if(dataMain.data && dataMain.data.length > 0) {
            // Main channel live
            player.src = twitchEmbed(MAIN_CHANNEL);
            chatFrame.src = twitchChat(MAIN_CHANNEL);
            playerTitle.textContent = `${MAIN_CHANNEL} is Live`;
            return;
        }

        // Now check Smarties team members + extras
        const teamRes = await fetch(`https://api.twitch.tv/helix/teams?name=${TEAM_NAME}`, {
            headers: {"Client-ID": CLIENT_ID, "Authorization": `Bearer ${token}`}
        });
        const teamData = await teamRes.json();
        let teamUsers = [];
        if(teamData.data && teamData.data.length > 0) {
            teamUsers = teamData.data[0].users.map(u => u.login);
        }
        teamUsers = [...teamUsers, ...EXTRA_CHANNELS]; // append extras like mookei

        // Check first live team member
        for(let channel of teamUsers) {
            const res = await fetch(`https://api.twitch.tv/helix/streams?user_login=${channel}`, {
                headers: {"Client-ID": CLIENT_ID, "Authorization": `Bearer ${token}`}
            });
            const data = await res.json();
            if(data.data && data.data.length > 0) {
                player.src = twitchEmbed(channel);
                chatFrame.src = twitchChat(channel);
                playerTitle.textContent = `${channel} is Live`;
                return;
            }
        }

        // No Twitch live, show YouTube
        player.src = youtubeEmbed;
        chatFrame.src = twitchChat(MAIN_CHANNEL);
        playerTitle.textContent = "YouTube Playlist";

    } catch(err) {
        console.error(err);
        player.src = youtubeEmbed;
        chatFrame.src = twitchChat(MAIN_CHANNEL);
        playerTitle.textContent = "YouTube Playlist";
    }
}

checkStreams();
setInterval(checkStreams, 60000);

</script>
</body>
</html>
